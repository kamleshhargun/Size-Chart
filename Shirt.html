<!DOCTYPE html>
<html>
<head>
  <title>Dress Size Chart</title>

  <style>
    body { font-family: Arial; text-align: center; }

    .btn-group { margin: 15px 0; }

    button {
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      margin: 5px;
      background: #000;
      color: #fff;
      border-radius: 5px;
    }

    button.active { background: orange; }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 600px;
    }

    th, td { border: 1px solid #ddd; padding: 8px; }

    th { background: #000; color: #fff; }

    .guide {
      margin-top: 30px;
      text-align: left;
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Dress Size Chart</h2>

<div class="btn-group">
  <button id="inchBtn" class="active" onclick="showTable('inch')">Inches</button>
  <button id="cmBtn" onclick="showTable('cm')">CM</button>
</div>

<table>
  <thead>
    <tr>
      <th>Size</th>
      <th>Chest</th>
      <th>Waist</th>
      <th>Length</th>
      <th>Sleeve</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="guide">
  <h3>How to Measure</h3>
  <p><b>Chest:</b> Measure around fullest part.</p>
  <p><b>Waist:</b> Measure natural waistline.</p>
  <p><b>Length:</b> Shoulder to length.</p>
  <p><b>Sleeve:</b> Shoulder to wrist.</p>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzofuBLg_ckv2iB4HQZWNeKEuZdmhVEtkkT7TtHbSKuRXmgr8ptmFDUw52ioaRJzUHybg/exec";
const SHEET_NAME = "Shirt"; // 👈 CHANGE HERE

let chartData = {};

function loadData() {
  fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    chartData = data;
    renderTable("inch");
  });
}

function renderTable(unit) {
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  chartData[SHEET_NAME][unit].forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${row.size}</td>
        <td>${row.chest}</td>
        <td>${row.waist}</td>
        <td>${row.length}</td>
        <td>${row.sleeve}</td>
      </tr>
    `;
  });
}

function showTable(unit) {
  renderTable(unit);

  inchBtn.classList.remove("active");
  cmBtn.classList.remove("active");

  if (unit === "inch") inchBtn.classList.add("active");
  else cmBtn.classList.add("active");
}

loadData();

</script>

</body>
</html>
